# ============================================
# ConfiguraciĂ³ Mock SCSP amb PersistĂ¨ncia BBDD
# ============================================
#
# Aquest perfil permet desenvolupar i provar l'aplicació sense necessitat
# de certificats ni connexió als serveis SCSP reals, peṛ guardant TOTA
# la informació a la base de dades igual que ho fa el client real.
#
# Diferències amb mock-scsp:
#   - mock-scsp: No guarda res a BBDD (només simula)
#   - mock-scsp-db: Guarda tot a BBDD (permet recuperar i visualitzar)
#
# ATENCIó: Aquest perfil NO s'ha d'utilitzar MAI en entorns de producció
#
# Per activar aquest perfil:
#   - Docker: -e SPRING_PROFILES_ACTIVE=mock-scsp-db
#   - DockerFile: afegir -Dspring.profiles.active=mock-scsp-db al ENV JAVA_OPTS
#   - Línia de comandes: -Dspring.profiles.active=mock-scsp-db
#   - Variable d'entorn: SPRING_PROFILES_ACTIVE=mock-scsp-db
#   - IntelliJ IDEA: Run > Edit Configurations > Active profiles: mock-scsp-db
#

# Configuració de logging per veure clarament quan el mock està actiu
logging.level.es.caib.pinbal.scsp.mock=INFO
logging.level.es.scsp.common.dao=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Banner personalitzat
spring.main.banner-mode=console

# Paràmetres del mock amb persistència
pinbal.scsp.mock.enabled=true
pinbal.scsp.mock.persist=true
pinbal.scsp.mock.latency.ms=500
pinbal.scsp.mock.simulate.errors=false

# IMPORTANT: Assegurar-se que Hibernate està configurat
# per gestionar les transaccions correctament
spring.jpa.properties.hibernate.current_session_context_class=thread
