# ============================================
# ConfiguraciĂ³ Mock SCSP per Desenvolupament
# ============================================
#
# Aquest perfil permet desenvolupar i provar l'aplicació sense necessitat
# de certificats ni connexió als serveis SCSP reals.
#
# ATENCIó: Aquest perfil NO s'ha d'utilitzar MAI en entorns de producció
#
# Per activar aquest perfil:
#   - Docker: -e SPRING_PROFILES_ACTIVE=mock-scsp
#   - DockerFile: afegir -Dspring.profiles.active=mock-scsp al ENV JAVA_OPTS
#   - Línia de comandes: -Dspring.profiles.active=mock-scsp
#   - Variable d'entorn: SPRING_PROFILES_ACTIVE=mock-scsp
#   - IntelliJ IDEA: Run > Edit Configurations > Active profiles: mock-scsp
#

# Configuració de logging per veure clarament quan el mock està actiu
logging.level.es.caib.pinbal.scsp.mock=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Banner personalitzat per indicar que s'està utilitzant el mock
spring.main.banner-mode=console

# Paràmetres del mock (opcionals, per futura extensió)
pinbal.scsp.mock.enabled=true
pinbal.scsp.mock.latency.ms=500
pinbal.scsp.mock.simulate.errors=false
